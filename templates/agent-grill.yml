name: agent-grill
on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
jobs:
  call:
    permissions:
      contents: read
      issues: write
    uses: OWNER/agent-issue-ops/.github/workflows/agent.reusable.yml@master
    with:
      role: grill
      trigger_phrase: "@agent-grill"
    secrets: inherit
