name: agent-reusable
on:
  workflow_call:
    inputs:
      role:
        description: "explorer | fix | grill"
        required: true
        type: string
      trigger_phrase:
        required: true
        type: string
    secrets:
      CODEX_AUTH_JSON:
        description: "Contents of ~/.codex/auth.json (ChatGPT-plan managed auth). Reseed via bootstrap.sh."
        required: true
jobs:
  run:
    runs-on: ubuntu-latest
    # Engine enforcement: every role runs on OpenAI Codex (GPT). There is no
    # per-run engine choice — changing engines means editing THIS file.
    # Gate: the trigger phrase must appear in the triggering comment (or issue
    # body for issue events), and the author must have repo standing. Kept
    # explicit per event — the `comment.body || issue.body` fallback form
    # skipped on `issues` events in practice.
    if: >-
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, inputs.trigger_phrase) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'issues' &&
        contains(github.event.issue.body, inputs.trigger_phrase) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    steps:
      - uses: actions/checkout@v4
      - name: Select role prompt
        run: |
          set -euo pipefail
          cat > /tmp/agent-context.md <<CONTEXT
          GITHUB CONTEXT (you run headless inside GitHub Actions):
          - Repository: ${{ github.repository }}
          - Issue: #${{ github.event.issue.number }}
          - The gh CLI is pre-authenticated via GH_TOKEN. Use it for ALL GitHub interaction:
            read the issue + comments: gh issue view ${{ github.event.issue.number }} --comments
            post a comment:            gh issue comment ${{ github.event.issue.number }} --body-file <file>
            apply a label:             gh issue edit ${{ github.event.issue.number }} --add-label <label>
            open a PR (fix role only): git checkout -b <branch>, commit, git push -u origin <branch>, gh pr create
          - Your token carries least-privilege permissions for your role; out-of-role actions will fail.

          CONTEXT
          case "${{ inputs.role }}" in
            explorer)
              cat > /tmp/agent-prompt.md <<'PROMPT'
          You are @agent-explorer, mentioned on a GitHub issue in this repo.
          You are READ-ONLY: you may NOT change code, create branches, or open PRs.
          1. Read the issue title, body, and every comment.
          2. Explore the repository for all context relevant to this issue: the files
             involved (path:line), how they work today, related tests, the repo's
             AGENTS.md / CLAUDE.md coding standards, and any spec/PRD it references.
          3. Compact it into a TIGHT brief a fresh engineer could act on without
             re-exploring: the problem, exact files/functions, the constraints, and
             the smallest correct approach.
          4. Recommend exactly ONE next move and name the agent:
             - "@agent-fix" if the issue is well-scoped and safe to implement now.
             - "@agent-grill" if it is under-specified and needs sharpening first.
             Give a one-line reason. Then apply the matching routing label:
             "route:afk-agent" for @agent-fix, "route:grill-first" for
             @agent-grill — or "route:human" (and say why) if the issue needs
             human judgment, credentials, or hands-on work no agent should
             attempt.
          5. If this issue must be resolved BEFORE other issues in the repo (it gates
             dependent work — e.g. a large grill-me others build on), apply the
             "do-first" label to the issue and say so in your brief. Most minor bug
             fixes are order-independent — leave them unlabeled.
          Post the brief + recommendation as ONE issue comment. Do NOT summon the next
          agent (the human will). Do NOT edit files (labelling the issue is allowed).
          PROMPT
              ;;
            fix)
              cat > /tmp/agent-prompt.md <<'PROMPT'
          You are @agent-fix, mentioned on a GitHub issue in this repo.
          Follow the Pocock implement protocol, test-first:
          1. Read the issue and the @agent-explorer brief in the comments (your context).
          2. Read the repo's AGENTS.md / CLAUDE.md coding standards and matching tests.
          3. TDD: write a FAILING test capturing the fix, run it and confirm it fails,
             then write the minimal code to pass, then run the full suite green.
          4. Self-review the diff on two axes and fix what you find: Standards (repo's
             documented standards) and Spec (does exactly what the issue asked, no more).
          5. Open ONE single-branch pull request proposing merge into the default branch,
             titled for the issue and linking it (Closes #N).
          HARD RULES: one branch only; open a PR but NEVER merge it; if the issue is too
          large or ambiguous to fix safely, stop and comment recommending "@agent-grill".
          PROMPT
              ;;
            grill)
              cat > /tmp/agent-prompt.md <<'PROMPT'
          You are @agent-grill, mentioned on a GitHub issue in this repo.
          The issue is under-specified. Run a grill-me pass BEFORE any code:
          1. Read the issue and any @agent-explorer brief.
          2. Post ONE comment with the smallest set of pointed questions whose answers
             you need to make this issue safe to implement: scope boundaries, acceptance
             criteria, edge cases, and anything ambiguous. No filler.
          3. Do NOT change code and do NOT open a PR.
          When the human answers they will mention "@agent-fix". If the issue is clearly
          scoped after your questions, end your comment recommending "@agent-fix".
          PROMPT
              ;;
            *)
              echo "unknown role: ${{ inputs.role }}" >&2; exit 1 ;;
          esac
          {
            echo "AGENT_PROMPT<<PROMPT_EOF"
            cat /tmp/agent-context.md /tmp/agent-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_ENV"
      - name: Seed Codex auth (ChatGPT plan — no API key)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${CODEX_AUTH_JSON}" ]; then
            echo "CODEX_AUTH_JSON secret is empty — reseed it: run ./bootstrap.sh from agent-issue-ops" >&2
            exit 1
          fi
          mkdir -p /home/runner/.codex
          chmod 700 /home/runner/.codex
          printf '%s' "${CODEX_AUTH_JSON}" > /home/runner/.codex/auth.json
          chmod 600 /home/runner/.codex/auth.json
          # File-backed credentials (no keychain on CI) + allow network inside the
          # workspace-write sandbox so gh / git push / test deps work. Filesystem
          # writes stay confined to the checkout.
          cat > /home/runner/.codex/config.toml <<'TOML'
          cli_auth_credentials_store = "file"

          [sandbox_workspace_write]
          network_access = true
          TOML
      - name: Enable user namespaces for the Codex sandbox
        # Ubuntu 24.04 runners block unprivileged user namespaces (AppArmor),
        # killing bubblewrap with "bwrap: setting up uid map: Permission
        # denied" — every shell command inside Codex fails. Same workaround
        # openai/codex-action ships for its own runs.
        run: |
          set -euo pipefail
          if [ "$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || echo 1)" != "1" ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          if [ "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || echo 0)" != "0" ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - name: Install Codex CLI
        run: npm install -g @openai/codex
      - name: Run Codex (sole engine — GPT via ChatGPT plan)
        # openai/codex-action@v1 is API-key-only: its Responses-API proxy starts
        # only when openai-api-key is set, and the prompt path then dies reading
        # the proxy's server-info file. ChatGPT-plan auth therefore invokes the
        # CLI directly against the seeded CODEX_HOME. Prompt arrives via stdin
        # ("-") so the issue body is never shell-interpolated.
        env:
          GH_TOKEN: ${{ github.token }}
          CODEX_HOME: /home/runner/.codex
        run: |
          set -euo pipefail
          printf '%s' "$AGENT_PROMPT" | codex exec --sandbox workspace-write -
